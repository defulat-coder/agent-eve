services:
  postgres:
    image: postgres:17-alpine
    container_name: project_template_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: project_template
      POSTGRES_PASSWORD: project_template
      POSTGRES_DB: project_template
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_template -d project_template"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: project_template_redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
